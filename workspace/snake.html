<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    color: #4ecca3;
    text-shadow: 0 0 20px rgba(78, 204, 163, 0.4);
  }
  #score-display {
    font-size: 1rem;
    color: #a0a0b0;
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
  }
  #score-display span {
    color: #e0e0e0;
    font-weight: 600;
  }
  canvas {
    border: 2px solid #2d2d4e;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(78, 204, 163, 0.1);
    display: block;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: rgba(10, 10, 20, 0.92);
    border-radius: 8px;
    padding: 2.5rem 3rem;
  }
  #overlay h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #4ecca3;
  }
  #overlay p {
    font-size: 1rem;
    color: #a0a0b0;
    text-align: center;
    line-height: 1.5;
  }
  #overlay .score-line {
    font-size: 1.1rem;
    color: #e0e0e0;
  }
  #overlay .high-score-line {
    font-size: 0.95rem;
    color: #a0a0b0;
  }
  button {
    margin-top: 0.5rem;
    padding: 0.7rem 2.2rem;
    background: #4ecca3;
    color: #0a0a14;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: #6ee7c0; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .hint {
    font-size: 0.8rem;
    color: #606070;
  }
  #canvas-wrap {
    position: relative;
  }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="score-display">Score: <span id="score">0</span> &nbsp;|&nbsp; High Score: <span id="high-score">0</span></div>
<div id="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">Use arrow keys to move.<br>Eat food to grow and score points.</p>
    <div id="overlay-scores" style="display:none">
      <div class="score-line">Score: <strong id="final-score">0</strong></div>
      <div class="high-score-line">High Score: <strong id="final-high">0</strong></div>
    </div>
    <button id="btn">Play</button>
    <span class="hint">Arrow keys or WASD</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, highScore, gameLoop, running;

highScore = parseInt(localStorage.getItem('snake_hs') || '0');
document.getElementById('high-score').textContent = highScore;
document.getElementById('final-high').textContent = highScore;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  updateScore();
  placeFood();
  running = true;
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snake_hs', highScore);
    document.getElementById('high-score').textContent = highScore;
  }
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const g = Math.round(180 - t * 80);
    ctx.fillStyle = i === 0 ? '#4ecca3' : `rgb(30, ${g}, ${Math.round(100 + t * 50)})`;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 3);
    ctx.fill();
  });

  // Food
  ctx.fillStyle = '#ff6b6b';
  ctx.shadowColor = '#ff6b6b';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-msg').textContent = '';
  document.getElementById('overlay-scores').style.display = 'block';
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-high').textContent = highScore;
  document.getElementById('btn').textContent = 'Play Again';
  document.getElementById('overlay').style.display = 'flex';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay-scores').style.display = 'none';
  document.getElementById('overlay-msg').textContent = 'Use arrow keys to move.\nEat food to grow and score points.';
  init();
  draw();
  gameLoop = setInterval(step, 120);
}

document.getElementById('btn').addEventListener('click', startGame);

const DIRS = {
  ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
  ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
  ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
  ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
};

document.addEventListener('keydown', e => {
  const d = DIRS[e.key];
  if (!d) return;
  if (e.key.startsWith('Arrow')) e.preventDefault();
  if (!running) return;
  // Prevent reverse
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
});

// Initial draw
ctx.fillStyle = '#0d0d1a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
